<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskify – Elegant To Do App</title>
    <meta
      name="description"
      content="A beautiful, elegant To Do app built with Tailwind CSS featuring glassmorphism, animations, and task management."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { inter: ["Inter", "sans-serif"] },
            animation: {
              "slide-in": "slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)",
              "fade-in": "fadeIn 0.3s ease-out",
              pop: "pop 0.2s ease-out",
              shake: "shake 0.4s ease-in-out",
            },
            keyframes: {
              slideIn: {
                "0%": {
                  opacity: "0",
                  transform: "translateY(-20px) scale(0.95)",
                },
                "100%": { opacity: "1", transform: "translateY(0) scale(1)" },
              },
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              pop: {
                "0%": { transform: "scale(1)" },
                "50%": { transform: "scale(1.08)" },
                "100%": { transform: "scale(1)" },
              },
              shake: {
                "0%,100%": { transform: "translateX(0)" },
                "20%": { transform: "translateX(-6px)" },
                "40%": { transform: "translateX(6px)" },
                "60%": { transform: "translateX(-4px)" },
                "80%": { transform: "translateX(4px)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .task-item {
        transition: all 0.3s ease;
      }
      .task-item:hover {
        transform: translateX(4px);
      }
      .task-item.removing {
        animation: slideOut 0.3s ease forwards;
      }
      @keyframes slideOut {
        to {
          opacity: 0;
          transform: translateX(40px) scale(0.95);
        }
      }
      .checkbox-custom {
        transition: all 0.2s ease;
      }
      .checkbox-custom:checked + label .check-box {
        background: linear-gradient(135deg, #a78bfa, #ec4899);
        border-color: transparent;
      }
      .progress-bar {
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(167, 139, 250, 0.4);
        border-radius: 10px;
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      .priority-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .tab-active {
        background: linear-gradient(135deg, #7c3aed, #db2777);
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-950 text-white overflow-x-hidden">
    <!-- Animated background blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div
        class="absolute -top-40 -left-40 w-96 h-96 rounded-full opacity-20"
        style="
          background: radial-gradient(circle, #7c3aed, transparent);
          animation: float1 8s ease-in-out infinite;
        "
      ></div>
      <div
        class="absolute top-1/2 -right-40 w-80 h-80 rounded-full opacity-15"
        style="
          background: radial-gradient(circle, #db2777, transparent);
          animation: float2 10s ease-in-out infinite;
        "
      ></div>
      <div
        class="absolute -bottom-20 left-1/3 w-72 h-72 rounded-full opacity-10"
        style="
          background: radial-gradient(circle, #2563eb, transparent);
          animation: float3 12s ease-in-out infinite;
        "
      ></div>
    </div>
    <style>
      @keyframes float1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, 30px) scale(1.1);
        }
      }
      @keyframes float2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-20px, 20px) scale(1.05);
        }
      }
      @keyframes float3 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(20px, -20px) scale(1.08);
        }
      }
    </style>

    <!-- Main Content -->
    <div
      class="relative z-10 min-h-screen flex items-start justify-center py-12 px-4"
    >
      <div class="w-full max-w-lg animate-fade-in">
        <!-- Header -->
        <div class="text-center mb-8">
          <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
            style="
              background: linear-gradient(135deg, #7c3aed, #db2777);
              box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
            "
          >
            <svg
              class="w-8 h-8 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
          </div>
          <h1
            class="text-4xl font-bold mb-1"
            style="
              background: linear-gradient(135deg, #c4b5fd, #f9a8d4, #93c5fd);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
          >
            Taskify
          </h1>
          <p class="text-gray-400 text-sm font-medium tracking-wider uppercase">
            Your elegant task manager
          </p>
        </div>

        <!-- Card -->
        <div
          class="glass rounded-3xl p-6 shadow-2xl"
          style="box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5)"
        >
          <!-- Progress Section -->
          <div id="progressSection" class="mb-6 hidden">
            <div class="flex justify-between items-center mb-2">
              <span
                class="text-xs text-gray-400 font-medium uppercase tracking-wider"
                >Progress</span
              >
              <span
                id="progressText"
                class="text-xs font-bold"
                style="color: #a78bfa"
                >0%</span
              >
            </div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden">
              <div
                id="progressBar"
                class="h-full rounded-full progress-bar"
                style="
                  width: 0%;
                  background: linear-gradient(90deg, #7c3aed, #db2777);
                "
              ></div>
            </div>
            <div class="flex justify-between mt-2">
              <span id="statsDone" class="text-xs text-gray-500">0 done</span>
              <span id="statsLeft" class="text-xs text-gray-500">0 left</span>
            </div>
          </div>

          <!-- Input Area -->
          <div class="flex gap-2 mb-5">
            <div class="flex-1 relative">
              <input
                id="taskInput"
                type="text"
                placeholder="Add a new task..."
                maxlength="80"
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white outline-none transition-all duration-300 focus:border-purple-500/50 focus:bg-white/10"
                style="box-shadow: 0 0 0 0 rgba(124, 58, 237, 0)"
                onfocus="
                  this.style.boxShadow = '0 0 0 3px rgba(124,58,237,0.2)'
                "
                onblur="this.style.boxShadow = '0 0 0 0 rgba(124,58,237,0)'"
              />
            </div>
            <!-- Priority Selector -->
            <select
              id="prioritySelect"
              class="bg-white/5 border border-white/10 rounded-2xl px-3 py-3 text-xs text-gray-300 outline-none cursor-pointer transition-all duration-200 hover:border-purple-500/40"
              style="appearance: none"
            >
              <option value="high" class="bg-gray-900">🔴 High</option>
              <option value="medium" selected class="bg-gray-900">
                🟡 Med
              </option>
              <option value="low" class="bg-gray-900">🟢 Low</option>
            </select>
            <!-- Add Button -->
            <button
              id="addBtn"
              onclick="addTask()"
              class="px-4 py-3 rounded-2xl font-semibold text-sm transition-all duration-200 active:scale-95 hover:opacity-90"
              style="
                background: linear-gradient(135deg, #7c3aed, #db2777);
                box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
              "
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.5"
                  d="M12 4v16m8-8H4"
                />
              </svg>
            </button>
          </div>

          <!-- Filter Tabs -->
          <div
            id="filterTabs"
            class="flex gap-1 mb-5 p-1 bg-white/5 rounded-2xl"
          >
            <button
              onclick="setFilter('all')"
              id="tab-all"
              class="flex-1 py-2 rounded-xl text-xs font-semibold transition-all duration-200 tab-active text-white"
            >
              All
            </button>
            <button
              onclick="setFilter('active')"
              id="tab-active"
              class="flex-1 py-2 rounded-xl text-xs font-semibold transition-all duration-200 text-gray-400 hover:text-white"
            >
              Active
            </button>
            <button
              onclick="setFilter('completed')"
              id="tab-completed"
              class="flex-1 py-2 rounded-xl text-xs font-semibold transition-all duration-200 text-gray-400 hover:text-white"
            >
              Completed
            </button>
          </div>

          <!-- Task List -->
          <div
            id="taskList"
            class="space-y-2 max-h-80 overflow-y-auto pr-1"
          ></div>

          <!-- Empty State -->
          <div id="emptyState" class="text-center py-12">
            <div class="text-6xl mb-4 opacity-40">✨</div>
            <p class="text-gray-500 text-sm font-medium">No tasks yet.</p>
            <p class="text-gray-600 text-xs mt-1">Add your first task above!</p>
          </div>

          <!-- Footer Actions -->
          <div
            id="footerActions"
            class="flex justify-between items-center mt-5 pt-4 border-t border-white/5 hidden"
          >
            <span id="footerCount" class="text-xs text-gray-500"></span>
            <button
              onclick="clearCompleted()"
              class="text-xs text-gray-500 hover:text-pink-400 transition-colors duration-200 font-medium"
            >
              Clear completed
            </button>
          </div>
        </div>

        <!-- Footer Text -->
        <p class="text-center text-gray-700 text-xs mt-6">
          Built with ❤️ Created By SILENT
        </p>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "taskify_tasks";

      // ── Database Engine (LocalStorage Wrapper) ──────────────────────
      const DB = {
        getTasks() {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        },
        saveTasks(tasks) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        },
        addTask(text, priority) {
          const tasks = this.getTasks();
          const newTask = {
            id: Date.now(),
            text,
            priority,
            done: false,
            created: new Date().toISOString(),
          };
          tasks.unshift(newTask);
          this.saveTasks(tasks);
          return newTask;
        },
        updateTask(id, updates) {
          const tasks = this.getTasks();
          const idx = tasks.findIndex((t) => t.id === id);
          if (idx !== -1) {
            tasks[idx] = { ...tasks[idx], ...updates };
            this.saveTasks(tasks);
            return tasks[idx];
          }
          return null;
        },
        deleteTask(id) {
          const tasks = this.getTasks().filter((t) => t.id !== id);
          this.saveTasks(tasks);
          return tasks;
        },
        clearCompleted() {
          const tasks = this.getTasks().filter((t) => !t.done);
          this.saveTasks(tasks);
          return tasks;
        },
      };

      let tasks = DB.getTasks();
      let currentFilter = "all";

      const priorityColors = {
        high: { bg: "rgba(239,68,68,0.15)", dot: "#ef4444", text: "#fca5a5" },
        medium: { bg: "rgba(234,179,8,0.12)", dot: "#eab308", text: "#fde047" },
        low: { bg: "rgba(34,197,94,0.12)", dot: "#22c55e", text: "#86efac" },
      };

      function addTask() {
        const input = document.getElementById("taskInput");
        const priority = document.getElementById("prioritySelect").value;
        const text = input.value.trim();

        if (!text) {
          input.classList.add("animate-shake");
          input.style.borderColor = "rgba(239,68,68,0.5)";
          setTimeout(() => {
            input.classList.remove("animate-shake");
            input.style.borderColor = "";
          }, 500);
          return;
        }

        DB.addTask(text, priority);
        tasks = DB.getTasks();
        input.value = "";
        renderTasks();

        // Animate button
        const btn = document.getElementById("addBtn");
        btn.classList.add("animate-pop");
        setTimeout(() => btn.classList.remove("animate-pop"), 300);
      }

      function toggleTask(id) {
        const task = tasks.find((t) => t.id === id);
        if (task) {
          DB.updateTask(id, { done: !task.done });
          tasks = DB.getTasks();
          renderTasks();
        }
      }

      function editTask(id) {
        const task = tasks.find((t) => t.id === id);
        if (!task) return;

        const newText = prompt("Edit your task:", task.text);
        if (newText !== null && newText.trim() !== "") {
          DB.updateTask(id, { text: newText.trim() });
          tasks = DB.getTasks();
          renderTasks();
        }
      }

      function deleteTask(id) {
        const el = document.getElementById("task-" + id);
        if (el) {
          el.classList.add("removing");
          setTimeout(() => {
            tasks = DB.deleteTask(id);
            renderTasks();
          }, 280);
        }
      }

      function clearCompleted() {
        tasks = DB.clearCompleted();
        renderTasks();
      }

      function setFilter(f) {
        currentFilter = f;
        ["all", "active", "completed"].forEach((tab) => {
          const el = document.getElementById("tab-" + tab);
          if (el) {
            el.classList.remove("tab-active", "text-white");
            el.classList.add("text-gray-400");
          }
        });
        const active = document.getElementById("tab-" + f);
        if (active) {
          active.classList.add("tab-active", "text-white");
          active.classList.remove("text-gray-400");
        }
        renderTasks();
      }

      function getFiltered() {
        if (currentFilter === "active") return tasks.filter((t) => !t.done);
        if (currentFilter === "completed") return tasks.filter((t) => t.done);
        return tasks;
      }

      function renderTasks() {
        const list = document.getElementById("taskList");
        const empty = document.getElementById("emptyState");
        const footer = document.getElementById("footerActions");
        const progress = document.getElementById("progressSection");
        const filtered = getFiltered();
        const total = tasks.length;
        const doneCounts = tasks.filter((t) => t.done).length;

        list.innerHTML = "";

        if (filtered.length === 0) {
          empty.classList.remove("hidden");
          list.classList.add("hidden");
        } else {
          empty.classList.add("hidden");
          list.classList.remove("hidden");

          filtered.forEach((task, i) => {
            const p = priorityColors[task.priority];
            const item = document.createElement("div");
            item.id = "task-" + task.id;
            item.className =
              "task-item flex items-center gap-3 p-3 rounded-2xl group cursor-pointer animate-slide-in";
            item.style.cssText = `background:${p.bg}; border:1px solid ${p.dot}22; animation-delay:${i * 0.04}s;`;

            item.innerHTML = `
            <!-- Checkbox -->
            <button onclick="toggleTask(${task.id})"
              class="flex-shrink-0 w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all duration-200"
              style="border-color:${task.done ? "transparent" : p.dot}; background:${task.done ? `linear-gradient(135deg, #a78bfa, #ec4899)` : "transparent"}; box-shadow:${task.done ? "0 0 12px rgba(167,139,250,0.3)" : "none"};">
              ${
                task.done
                  ? `<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
              </svg>`
                  : ""
              }
            </button>

            <!-- Priority Dot -->
            <span class="flex-shrink-0 w-2 h-2 rounded-full" style="background:${p.dot}; box-shadow:0 0 6px ${p.dot}88;"></span>

            <!-- Text -->
            <span class="flex-1 text-sm font-medium transition-all duration-200 ${task.done ? "line-through text-gray-500" : "text-gray-100"}"
                  onclick="toggleTask(${task.id})">
              ${escapeHtml(task.text)}
            </span>

            <!-- Actions container -->
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all duration-200">
              <!-- Edit btn -->
              <button onclick="editTask(${task.id})"
                class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center transition-all duration-200 hover:bg-white/10 hover:text-purple-400 text-gray-500">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
              </button>

              <!-- Delete btn -->
              <button onclick="deleteTask(${task.id})"
                class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center transition-all duration-200 hover:bg-red-500/20 hover:text-red-400 text-gray-500">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          `;
            list.appendChild(item);
          });
        }

        // Progress bar
        if (total > 0) {
          progress.classList.remove("hidden");
          const pct = Math.round((doneCounts / total) * 100);
          document.getElementById("progressBar").style.width = pct + "%";
          document.getElementById("progressText").textContent = pct + "%";
          document.getElementById("statsDone").textContent =
            doneCounts + " done";
          document.getElementById("statsLeft").textContent =
            total - doneCounts + " left";
        } else {
          progress.classList.add("hidden");
        }

        // Footer
        if (total > 0) {
          footer.classList.remove("hidden");
          const left = tasks.filter((t) => !t.done).length;
          document.getElementById("footerCount").textContent =
            `${left} task${left !== 1 ? "s" : ""} remaining`;
        } else {
          footer.classList.add("hidden");
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // Enter key
      document.getElementById("taskInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTask();
      });

      // Initial render
      renderTasks();
    </script>
  </body>
</html>
